                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Количество</label>
                      <input
                        type="number"
                        required
                        min="1"
                        placeholder="Кол-во"
                        value={opForm.qty}
                        onChange={(e) => setOpForm({ ...opForm, qty: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Цена за единицу (руб.)</label>
                      <input
                        type="number"
                        required
                        min="0"
                        placeholder="Цена"
                        value={opForm.price}
                        onChange={(e) => setOpForm({ ...opForm, price: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                      />
                    </div>
                  </div>

                  {opType === "Перемещение" ? (
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-semibold text-slate-500 uppercase">Склад-ОТПРАВИТЕЛЬ</label>
                        <select
                          required
                          value={opForm.sourceWarehouseId}
                          onChange={(e) => setOpForm({ ...opForm, sourceWarehouseId: e.target.value })}
                          className="mt-1 block w-full px-3 py-2 border rounded-md bg-white shadow-sm focus:ring-primary focus:border-primary"
                        >
                          <option value="">-- Откуда --</option>
                          {warehouses.map(w => (
                            <option key={w.id} value={w.id}>{w.name}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-semibold text-slate-500 uppercase">Склад-ПОЛУЧАТЕЛЬ</label>
                        <select
                          required
                          value={opForm.warehouseId}
                          onChange={(e) => setOpForm({ ...opForm, warehouseId: e.target.value })}
                          className="mt-1 block w-full px-3 py-2 border rounded-md bg-white shadow-sm focus:ring-primary focus:border-primary"
                        >
                          <option value="">-- Куда --</option>
                          {warehouses.map(w => (
                            <option key={w.id} value={w.id}>{w.name}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Склад хранения</label>
                      <select
                        required
                        value={opForm.warehouseId}
                        onChange={(e) => setOpForm({ ...opForm, warehouseId: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md bg-white shadow-sm focus:ring-primary focus:border-primary"
                      >
                        <option value="">-- Выберите склад размещения --</option>
                        {warehouses.map(w => (
                          <option key={w.id} value={w.id}>{w.name}</option>
                        ))}
                      </select>
                    </div>
                  )}

                  {opType === "Поступление" && (
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Поставщик</label>
                      <select
                        required
                        value={opForm.counterparty}
                        onChange={(e) => setOpForm({ ...opForm, counterparty: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md bg-white shadow-sm focus:ring-primary focus:border-primary"
                      >
                        <option value="">-- Выберите поставщика --</option>
                        {sellers.map(s => (
                          <option key={s.id} value={s.name}>{s.name}</option>
                        ))}
                        <option value="NEW" className="text-blue-600 font-bold bg-blue-50 font-medium">➕ [Добавить нового поставщика на лету]</option>
                      </select>
                    </div>
                  )}

                  {opType === "Отгрузка" && (
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Покупатель (Клиент)</label>
                      <select
                        required
                        value={opForm.counterparty}
                        onChange={(e) => setOpForm({ ...opForm, counterparty: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md bg-white shadow-sm focus:ring-primary focus:border-primary"
                      >
                        <option value="">-- Выберите клиента --</option>
                        {clients.map(c => (
                          <option key={c.id} value={c.name}>{c.name}</option>
                        ))}
                        <option value="NEW" className="text-blue-600 font-bold bg-blue-50 font-medium">➕ [Добавить нового покупателя на лету]</option>
                      </select>
                    </div>
                  )}

                  {opType === "Списание" && (
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Причина списания</label>
                      <input
                        type="text"
                        required
                        placeholder="Напр.: Производственный брак, деформация корпуса"
                        value={opForm.counterparty}
                        onChange={(e) => setOpForm({ ...opForm, counterparty: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                      />
                    </div>
                  )}

                  {opForm.counterparty === "NEW" && (
                    <div className="p-4 bg-orange-50 rounded-lg border border-orange-200 space-y-3">
                      <p className="text-xs font-bold text-orange-800">Быстрое создание контрагента:</p>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500">Название компании / ФИО</label>
                        <input 
                          type="text" 
                          required
                          placeholder="ООО Ромашка или ИП Иванов" 
                          value={opForm.newCounterpartyName} 
                          onChange={(e) => setOpForm({ ...opForm, newCounterpartyName: e.target.value, newCounterpartyType: opType === 'Поступление' ? 'seller' : 'client' })} 
                          className="w-full px-2 py-1 text-xs border rounded bg-white mt-1 shadow-sm" 
                        />
                      </div>
                    </div>
                  )}

                  <div className="flex justify-end gap-2 pt-4 border-t">
                    <button type="button" onClick={() => setShowOpModal(false)} className="px-4 py-2 border rounded text-slate-600 hover:bg-slate-50">Отмена</button>
                    <button type="submit" className="px-4 py-2 bg-primary text-white rounded hover:bg-blue-700">Провести документ</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Ж-2: МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ОПЕРАЦИИ (Только Admin) */}
          {showEditOpModal && editingOp && (
            <div className="fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white rounded-lg max-w-lg w-full p-6 shadow-xl my-8">
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                  <h3 className="text-lg font-bold text-slate-900">Редактирование операции (Админ-панель)</h3>
                  <button onClick={() => setShowEditOpModal(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>

                <form onSubmit={handleUpdateOperation} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase">Тип операции</label>
                    <input type="text" disabled value={editingOp.type} className="mt-1 block w-full px-3 py-2 border rounded-md bg-slate-100 text-slate-600 cursor-not-allowed" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase">Товар</label>
                    <input type="text" disabled value={items.find(i => i.id === editingOp.itemId)?.name || ""} className="mt-1 block w-full px-3 py-2 border rounded-md bg-slate-100 text-slate-600 cursor-not-allowed" />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Количество</label>
                      <input
                        type="number"
                        required
                        min="1"
                        value={editingOp.qty}
                        onChange={(e) => setEditingOp({ ...editingOp, qty: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase">Цена (руб.)</label>
                      <input
                        type="number"
                        required
                        min="0"
                        value={editingOp.price}
                        onChange={(e) => setEditingOp({ ...editingOp, price: e.target.value })}
                        className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase">Контрагент / Описание</label>
                    <input
                      type="text"
                      required
                      value={editingOp.counterparty}
                      onChange={(e) => setEditingOp({ ...editingOp, counterparty: e.target.value })}
                      className="mt-1 block w-full px-3 py-2 border rounded-md shadow-sm focus:ring-primary focus:border-primary"
                    />
                  </div>

                  <div className="flex justify-end gap-2 pt-4 border-t">
                    <button type="button" onClick={() => setShowEditOpModal(false)} className="px-4 py-2 border rounded text-slate-600 hover:bg-slate-50">Отмена</button>
                    <button type="submit" className="px-4 py-2 bg-primary text-white rounded hover:bg-blue-700">Сохранить изменения</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* З: МОДАЛЬНОЕ ОКНО ИНВЕНТАРИЗАЦИИ */}
          {showInventoryModal && (
            <div className="fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white rounded-lg max-w-2xl w-full p-6 shadow-xl my-8">
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                  <h3 className="text-lg font-bold text-slate-900">
                    Сверка остатков: {warehouses.find(w => w.id === inventoryForm.warehouseId)?.name}
                  </h3>
                  <button onClick={() => setShowInventoryModal(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>

                <p className="text-xs text-slate-500 mb-4">
                  Введите в колонку «Фактический остаток» реальное количество товара на полках.
                </p>

                <div className="max-h-96 overflow-y-auto border rounded-lg">
                  <table className="min-w-full divide-y divide-slate-200 text-sm">
                    <thead className="bg-slate-50 sticky top-0">
                      <tr>
                        <th className="px-4 py-2 text-left text-xs font-semibold text-slate-500">Артикул / Товар</th>
                        <th className="px-4 py-2 text-center text-xs font-semibold text-slate-500">Учетный остаток</th>
                        <th className="px-4 py-2 text-center text-xs font-semibold text-slate-500">Фактический остаток</th>
                        <th className="px-4 py-2 text-center text-xs font-semibold text-slate-500">Разница</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 bg-white">
                      {inventoryForm.items.map(item => (
                        <tr key={item.itemId}>
                          <td className="px-4 py-2.5">
                            <span className="block font-semibold text-slate-900">{item.name}</span>
                            <span className="text-xs font-mono text-blue-600">{item.sku}</span>
                          </td>
                          <td className="px-4 py-2.5 text-center font-bold text-slate-700">
                            {item.currentBalance}
                          </td>
                          <td className="px-4 py-2.5 text-center w-32">
                            <input
                              type="number"
                              min="0"
                              value={item.actualBalance}
                              onChange={(e) => handleActualBalanceChange(item.itemId, e.target.value)}
                              className="w-20 px-2 py-1 text-center border rounded-md focus:ring-primary focus:border-primary text-sm shadow-sm"
                            />
                          </td>
                          <td className="px-4 py-2.5 text-center font-bold">
                            {item.diff === 0 ? (
                              <span className="text-slate-400">0</span>
                            ) : item.diff > 0 ? (
                              <span className="text-green-600 bg-green-50 px-1.5 py-0.5 rounded text-xs">+{item.diff} (Излишек)</span>
                            ) : (
                              <span className="text-red-600 bg-red-50 px-1.5 py-0.5 rounded text-xs">{item.diff} (Недостача)</span>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="flex justify-end gap-2 pt-4 border-t mt-4">
                  <button type="button" onClick={() => setShowInventoryModal(false)} className="px-4 py-2 border rounded text-slate-600 hover:bg-slate-50">Отмена</button>
                  <button type="button" onClick={handleCommitInventory} className="px-4 py-2 bg-success text-white rounded hover:bg-green-700">Зафиксировать результаты</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
